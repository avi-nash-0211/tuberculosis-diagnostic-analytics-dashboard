<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Data Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        input, select, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            background: #ff6b6b;
            color: white;
            cursor: pointer;
        }
        .chart-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
            gap: 20px;
        }
        .chart-box {
            width: 320px;
            height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 10px;
        }
        canvas {
            width: 300px !important;
            height: 300px !important;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
            color: black;
        }
        th, td {
            padding: 10px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload CSV File</h2>
        <input type="file" id="csvFile" accept=".csv">
        
        <h2>Select Drug Type</h2>
        <select id="drugTypeSelect" disabled></select>
        <button id="histogramButton" onclick="plotHistogram()" disabled>Show Histogram</button>
    </div>

    <div class="chart-container">
        <div class="chart-box">
            <h2>Histogram</h2>
            <canvas id="histogramChart"></canvas>
        </div>
        <div class="chart-box">
            <h2>Drug Distribution (Pie Chart)</h2>
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <div class="container">
        <h2>Top 10 Rows for Selected Drug Type</h2>
        <table id="dataTable">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let fullData = [];
        let drugData = {};
        let histogramChart = null;
        let pieChart = null;

        document.getElementById('csvFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    fullData = results.data;
                    processCSVData(results.data);
                },
                error: function() {
                    alert("Error reading CSV file. Please try again.");
                }
            });
        });

        function processCSVData(data) {
            drugData = {};
            if (!data.length || !data[0]['drg_type']) {
                alert("Invalid CSV file. Ensure it contains a 'drg_type' column.");
                return;
            }

            data.forEach(row => {
                let type = row['drg_type'];
                if (type) {
                    drugData[type] = (drugData[type] || 0) + 1;
                }
            });

            populateDropdown();
            plotPieChart();
        }

        function populateDropdown() {
            const select = document.getElementById("drugTypeSelect");
            select.innerHTML = "";
            
            if (Object.keys(drugData).length === 0) {
                select.disabled = true;
                document.getElementById("histogramButton").disabled = true;
                return;
            }

            Object.keys(drugData).forEach(type => {
                let option = document.createElement("option");
                option.value = type;
                option.textContent = type;
                select.appendChild(option);
            });

            select.disabled = false;
            document.getElementById("histogramButton").disabled = false;
        }

        function plotHistogram() {
            const selectedDrug = document.getElementById("drugTypeSelect").value;
            if (!selectedDrug) return;

            const total = Object.values(drugData).reduce((a, b) => a + b, 0);
            const percentage = ((drugData[selectedDrug] / total) * 100).toFixed(2);

            if (histogramChart) histogramChart.destroy();
            
            const ctx = document.getElementById("histogramChart").getContext("2d");
            histogramChart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: [selectedDrug],
                    datasets: [{
                        label: "Percentage (%)",
                        data: [percentage],
                        backgroundColor: "royalblue"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1000,
                        easing: 'easeOutBounce'
                    },
                    scales: { y: { beginAtZero: true, max: 100 } },
                }
            });

            displayTop10Rows(selectedDrug);
        }

        function plotPieChart() {
            const sortedData = Object.entries(drugData).sort((a, b) => b[1] - a[1]).slice(0, 5);
            if (!sortedData.length) return;

            const labels = sortedData.map(item => item[0]);
            const values = sortedData.map(item => item[1]);

            if (pieChart) pieChart.destroy();

            const ctx = document.getElementById("pieChart").getContext("2d");
            pieChart = new Chart(ctx, {
                type: "pie",
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#ff6b6b', '#6b5b95', '#ffcc5c', '#88d8b0', '#2a9d8f']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        animateRotate: true,
                        animateScale: true
                    }
                }
            });
        }

        function displayTop10Rows(selectedDrug) {
            const table = document.getElementById("dataTable");
            const filteredData = fullData.filter(row => row['drg_type'] === selectedDrug).slice(0, 10);
            
            if (filteredData.length === 0) return;

            const headers = Object.keys(filteredData[0]);
            table.querySelector("thead").innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
            table.querySelector("tbody").innerHTML = filteredData.map(row => `<tr>${headers.map(h => `<td>${row[h]}</td>`).join('')}</tr>`).join('');
        }
    </script>
</body>
</html>
