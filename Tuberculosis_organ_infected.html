<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuberculosis Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            padding: 20px;
            color: #2c3e50;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .chart-container {
            width: 30%; /* Reduced size */
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease-in-out;
        }

        .chart-container:hover {
            transform: scale(1.05);
        }

        select, input {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #34495e;
            background: white;
            cursor: pointer;
            font-weight: bold;
            color: #2c3e50;
            transition: all 0.3s ease;
            margin: 10px;
        }

        select:hover, input:hover {
            border-color: #2980b9;
            background-color: #f8f9fa;
        }

        .charts {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .chart-container {
                width: 80%; /* Adjust for mobile */
            }
        }
    </style>
</head>
<body>
    <h2>Tuberculosis Cases Analysis</h2>
    <input type="file" id="csvFileInput" accept=".csv">
    <select id="tbLocationDropdown">
        <option value="">Select TB Location</option>
    </select>
    
    <div class="charts">
        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <script>
        let globalData = {};
        let barChartInstance, pieChartInstance;

        document.getElementById('csvFileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                processCSV(e.target.result);
            };
            reader.readAsText(file);
        });

        function processCSV(csvText) {
            const tbLocations = {
                "Lungs": ["pulmonary", "lung"],
                "Eye": ["eye", "ocular"],
                "Ear": ["ear", "otic"],
                "Bones & Joints": ["bone", "joint", "spine", "vertebra"],
                "Lymph Nodes": ["lymph", "nodal"],
                "Meninges & Brain": ["mening", "brain", "cerebral"],
                "Abdomen": ["abdominal", "intestine", "peritoneal"]
            };

            const locationCounts = Object.fromEntries(Object.keys(tbLocations).map(key => [key, 0]));
            csvText.toLowerCase().split('\n').forEach(row => {
                for (const [location, keywords] of Object.entries(tbLocations)) {
                    if (keywords.some(keyword => row.includes(keyword))) {
                        locationCounts[location]++;
                    }
                }
            });

            globalData = locationCounts;
            populateDropdown(Object.keys(locationCounts));
            renderPieChart(globalData);
        }

        function populateDropdown(locations) {
            const dropdown = document.getElementById("tbLocationDropdown");
            dropdown.innerHTML = '<option value="">Select TB Location</option>';
            locations.forEach(loc => {
                const option = document.createElement("option");
                option.value = loc;
                option.textContent = loc;
                dropdown.appendChild(option);
            });

            dropdown.addEventListener("change", function() {
                if (this.value) {
                    renderBarChart(this.value);
                }
            });
        }

        function renderBarChart(selectedLocation) {
            const totalCases = Object.values(globalData).reduce((a, b) => a + b, 0);
            const percentage = ((globalData[selectedLocation] / totalCases) * 100).toFixed(2);

            if (barChartInstance) barChartInstance.destroy();
            
            barChartInstance = new Chart(document.getElementById('barChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: [selectedLocation],
                    datasets: [{
                        label: "% of Cases",
                        data: [percentage],
                        backgroundColor: '#3498db',
                        borderColor: '#2980b9',
                        borderWidth: 1,
                        hoverBackgroundColor: '#5dade2'
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, max: 100 } },
                    animation: { duration: 1200, easing: 'easeInOutQuart' }
                }
            });
        }

        function renderPieChart(data) {
            if (pieChartInstance) pieChartInstance.destroy();
            
            pieChartInstance = new Chart(document.getElementById('pieChart').getContext('2d'), {
                type: 'pie',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data).map(count => ((count / Object.values(data).reduce((a, b) => a + b, 0)) * 100).toFixed(2)),
                        backgroundColor: ['#ff6384', '#36a2eb', '#ffcd56', '#4bc0c0', '#9966ff', '#ff9f40', '#c9cbcf']
                    }]
                },
                options: {
                    responsive: true,
                    animation: { duration: 1500, easing: 'easeInOutBounce' }
                }
            });
        }
    </script>
</body>
</html>
