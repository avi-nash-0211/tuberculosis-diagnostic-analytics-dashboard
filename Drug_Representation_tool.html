<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Data Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* General Styling */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
            margin: 0;
            padding: 20px;
            color: white;
        }
        h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* File Upload & Controls */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }
        input[type="file"], select, button {
            margin: 10px;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }
        input[type="file"] {
            background: white;
            cursor: pointer;
        }
        select {
            background: white;
            color: black;
            cursor: pointer;
        }
        button {
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover {
            background: #e63946;
            transform: scale(1.05);
        }
        select:disabled, button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        /* Chart Layout */
        .chart-container {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .chart-box {
            width: 45%;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease-in-out;
        }
        .chart-box:hover {
            transform: scale(1.02);
        }
        canvas {
            width: 100%;
            max-height: 300px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container, .chart-box {
            animation: fadeIn 1s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload CSV File</h2>
        <input type="file" id="csvFile" accept=".csv">
        
        <h2>Select Drug Type</h2>
        <select id="drugTypeSelect" disabled></select>
        <button id="histogramButton" onclick="plotHistogram()" disabled>Show Histogram</button>
    </div>

    <div class="chart-container">
        <div class="chart-box">
            <h2>Histogram</h2>
            <canvas id="histogramChart"></canvas>
        </div>
        <div class="chart-box">
            <h2>Drug Distribution (Pie Chart)</h2>
            <canvas id="pieChart"></canvas>
        </div>
    </div>
    
    <script>
        let drugData = {};
        let histogramChart = null;
        let pieChart = null;

        document.getElementById('csvFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processCSVData(results.data);
                },
                error: function() {
                    alert("Error reading CSV file. Please try again.");
                }
            });
        });

        function processCSVData(data) {
            drugData = {};
            if (!data.length || !data[0]['drg_type']) {
                alert("Invalid CSV file. Ensure it contains a 'drg_type' column.");
                return;
            }

            data.forEach(row => {
                let type = row['drg_type'];
                if (type) {
                    drugData[type] = (drugData[type] || 0) + 1;
                }
            });

            populateDropdown();
            plotPieChart();
        }

        function populateDropdown() {
            const select = document.getElementById("drugTypeSelect");
            select.innerHTML = "";
            
            if (Object.keys(drugData).length === 0) {
                select.disabled = true;
                document.getElementById("histogramButton").disabled = true;
                return;
            }

            Object.keys(drugData).forEach(type => {
                let option = document.createElement("option");
                option.value = type;
                option.textContent = type;
                select.appendChild(option);
            });

            select.disabled = false;
            document.getElementById("histogramButton").disabled = false;
        }

        function plotHistogram() {
            const selectedDrug = document.getElementById("drugTypeSelect").value;
            if (!selectedDrug) return;

            const total = Object.values(drugData).reduce((a, b) => a + b, 0);
            const percentage = ((drugData[selectedDrug] / total) * 100).toFixed(2);

            if (histogramChart) histogramChart.destroy();
            
            const ctx = document.getElementById("histogramChart").getContext("2d");
            histogramChart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: [selectedDrug],
                    datasets: [{
                        label: "Percentage (%)",
                        data: [percentage],
                        backgroundColor: "royalblue"
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, max: 100 } },
                    animation: { duration: 1000 }
                }
            });
        }

        function plotPieChart() {
            const sortedData = Object.entries(drugData).sort((a, b) => b[1] - a[1]).slice(0, 5);
            if (!sortedData.length) return;

            const labels = sortedData.map(item => item[0]);
            const values = sortedData.map(item => item[1]);

            if (pieChart) pieChart.destroy();

            const ctx = document.getElementById("pieChart").getContext("2d");
            pieChart = new Chart(ctx, {
                type: "pie",
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#ff6b6b', '#6b5b95', '#ffcc5c', '#88d8b0', '#2a9d8f']
                    }]
                },
                options: {
                    responsive: true,
                    animation: { duration: 1000 }
                }
            });
        }
    </script>
</body>
</html>
